<!DOCTYPE html>
<html lang="{{ site.lang | default: "ja" }}">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="icon" type="image/jpg" href="https://raw.githubusercontent.com/Kfox-official/takes_db/refs/heads/main/icon.jpg">
    <title>{{ page.title | default: site.title }}</title>
    
    <style>
        /* ========================================== */
        /* 根幹から支配する：サイバーダーク共通スタイル */
        /* ========================================== */
        html, body {
            background-color: #0d1117 !important; /* 絶対に漆黒にする */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            line-height: 1.8;
            color: #c9d1d9 !important; /* 文字を明るいグレーに */
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 文字サイズと見出しのメリハリを絶対固定 */
        h1 { font-size: 2.2rem !important; border-bottom: 2px solid #21262d !important; padding-bottom: 0.4em; color: #f0f6fc !important; margin-top: 20px; }
        h2 { font-size: 1.6rem !important; border-bottom: 1px solid #21262d !important; padding-bottom: 0.3em; margin-top: 40px; color: #f0f6fc !important; }
        h3 { font-size: 1.2rem !important; color: #f0f6fc !important; margin-top: 30px; }
        p { font-size: 1.05rem !important; color: #c9d1d9 !important; margin: 1.2em 0; text-align: justify; }
        
        hr { height: 1px; padding: 0; margin: 30px 0; background-color: #21262d; border: 0; }
        ul, ol { padding-left: 2em; font-size: 1.05rem; }
        li { margin-top: 0.4em; color: #c9d1d9 !important; }
        
        /* 特徴的なアクセントカラー */
        strong { color: #ff79c6 !important; font-weight: bold; } /* 重要な文字はたけピンク */
        
        blockquote {
            margin: 1.5em 0;
            padding: 10px 20px;
            color: #8b949e !important;
            border-left: 0.25em solid #ff79c6 !important;
            background-color: #161b22 !important;
            border-radius: 4px;
        }
        
        /* リンクカラーの最適化 */
        a { color: #58a6ff !important; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline !important; color: #ff79c6 !important; }
        
        /* テーブル（目次など用）のデザイン */
        table { width: 100%; border-collapse: collapse; margin: 24px 0; background-color: #161b22; }
        th, td { padding: 12px; border: 1px solid #30363d; text-align: left; font-size: 1rem; }
        th { background-color: #21262d; color: #f0f6fc; }
        
        .footer { text-align: center; margin-top: 60px; color: #8b949e; font-size: 0.85em; border-top: 1px solid #21262d; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <section>
            {{ content }}
        </section>
    </div>

    <div class="footer">
        © 2026 Takes DB Project. All Rights Reserved.
    </div>

    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
</body>
</html>
