<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" type="image/jpg" href="https://raw.githubusercontent.com/Kfox-official/takes_db/refs/heads/main/icon.jpg">
    <title>{{ page.title | default: site.title }}</title>
    
    <style>
        /* 外部CSSが全カットされたので、ここが100%最優先されます */
        html, body {
            background-color: #0d1117 !important;
            color: #c9d1d9 !important;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 文字サイズと見出しのメリハリ */
        h1, h1 a { font-size: 2.2rem !important; color: #f0f6fc !important; font-weight: bold !important; border-bottom: 2px solid #21262d !important; padding-bottom: 0.4em !important; margin-top: 20px !important; text-decoration: none !important; }
        h2 { font-size: 1.6rem !important; color: #f0f6fc !important; font-weight: bold !important; border-bottom: 1px solid #21262d !important; padding-bottom: 0.3em !important; margin-top: 40px !important; }
        h3 { font-size: 1.2rem !important; color: #f0f6fc !important; font-weight: bold !important; margin-top: 30px !important; }
        
        p { font-size: 1.1rem !important; color: #c9d1d9 !important; text-align: justify !important; margin: 1.2em 0 !important; }
        ul, ol { padding-left: 2em !important; }
        li { font-size: 1.1rem !important; color: #c9d1d9 !important; margin-top: 0.5em !important; }
        
        /* アクセントカラー */
        strong { color: #ff79c6 !important; font-weight: bold !important; } /* 太字はたけピンク */
        a { color: #58a6ff !important; text-decoration: none !important; font-weight: bold !important; } /* リンクはブルー */
        a:hover { color: #ff79c6 !important; text-decoration: underline !important; }
        
        /* 引用（blockquote）のサイバー化 */
        blockquote {
            margin: 1.5em 0 !important;
            padding: 12px 20px !important;
            border-left: 4px solid #ff79c6 !important;
            background-color: #161b22 !important;
            border-radius: 4px !important;
        }
        
        /* テーブルをスタイリッシュに */
        table { width: 100% !important; border-collapse: collapse !important; margin: 24px 0 !important; background-color: #161b22 !important; }
        th, td { padding: 12px !important; border: 1px solid #30363d !important; font-size: 1rem !important; color: #c9d1d9 !important; }
        th { background-color: #21262d !important; color: #f0f6fc !important; }
        
        hr { height: 1px !important; background-color: #21262d !important; border: 0 !important; margin: 30px 0 !important; }
        .footer { text-align: center !important; margin-top: 60px !important; color: #8b949e !important; font-size: 0.85em !important; border-top: 1px solid #21262d !important; padding-top: 20px !important; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1><a href="{{ '/' | relative_url }}">{{ site.title | default: "TAKES_DB" }}</a></h1>
        </header>
        
        <section>
            {{ content }}
        </section>
    </div>

    <div class="footer">
        © 2026 Takes DB Project. All Rights Reserved.
    </div>

</body>
</html>
